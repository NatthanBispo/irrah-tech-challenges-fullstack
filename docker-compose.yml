services:
  postgres:
    image: postgres:16-alpine
    container_name: bcb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bcb
      POSTGRES_PASSWORD: bcb123
      POSTGRES_DB: bcb
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bcb -d bcb']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: bcb-backend
    restart: unless-stopped
    command: sh -c "npm install && npm run start:dev"
    environment:
      DATABASE_URL: postgresql://bcb:bcb123@postgres:5432/bcb?schema=public
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
    ports:
      - '3000:3000'
    volumes:
      - ./Backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: bcb-frontend
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
